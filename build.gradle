/*
 * This file was generated by the Gradle 'init' task.
 */


plugins {
    id 'java'
    id 'maven'
    id 'application'
    id 'com.github.johnrengelman.shadow' version '4.0.4'
}

repositories {
    mavenLocal()
    mavenCentral()
    maven {
        url = "https://repo1.maven.org/maven2/"
        url = "https://plugins.gradle.org/m2/"
//        url = 'http://repo.maven.apache.org/maven2'
        url = 'https://repo.spring.io/snapshot'
        url = 'https://repo.spring.io/milestone'
    }
}

dependencies {
    compile 'io.vertx:vertx-core:3.7.1'
    compile 'io.vertx:vertx-rx-java2:3.7.1'
    compile 'org.mongodb:mongodb-driver-sync:3.10.1'
    compile 'io.lettuce:lettuce-core:5.2.1.RELEASE'
    compile 'io.netty:netty-transport-native-epoll:4.1.33.Final:linux-x86_64'
    compile 'io.projectreactor:reactor-core:3.2.9.RELEASE'
    compile 'io.projectreactor.addons:reactor-adapter:3.2.3.RELEASE'
    testCompile 'io.projectreactor:reactor-test:3.2.9.RELEASE'

    /* 日志需要的依赖 */
    compile group: 'org.apache.logging.log4j', name: 'log4j-core', version: '2.11.+'
    compile group: 'org.apache.logging.log4j', name: 'log4j-api', version: '2.11.+'
    compile group: 'org.apache.logging.log4j', name: 'log4j-slf4j-impl', version: '2.11.+'
    compile group: 'com.lmax', name: 'disruptor', version: '3.4.+'

    /* 动态版本 */
    compile 'io.reactivex.rxjava2:rxjava:2.2.8'
    compile 'com.dslplatform:dsl-json-java8:1.9.8'
    annotationProcessor "com.dslplatform:dsl-json-java8:1.9.8"
    compile 'org.eclipse.collections:eclipse-collections-api:12.0.0.M2'
    compile 'org.eclipse.collections:eclipse-collections:12.0.0.M2'
    compile 'org.apache.commons:commons-lang3:3.14.0'
// 失效
//    compile 'commons-codec:commons-codec:latest.integration'
    compile 'commons-codec:commons-codec:1.17.1'
    compile group: 'com.google.code.findbugs', name: 'jsr305', version: 'latest.integration'
    compile 'org.rocksdb:rocksdbjni:6.8.1'
    compile group: 'org.springframework', name: 'spring-core', version: '5.2.6.RELEASE'
    compile group: 'org.quartz-scheduler', name: 'quartz', version: '2.3.0'

    /* Lombok依赖 */
    annotationProcessor 'org.projectlombok:lombok:latest.integration'
    compile 'org.projectlombok:lombok:latest.integration'

    /*elasticsearch依赖包*/
    compile group: 'org.elasticsearch.client', name: 'elasticsearch-rest-high-level-client', version: '6.5.4'
    compile 'org.elasticsearch.client:elasticsearch-rest-high-level-client:6.5.4'
    compile group: 'org.elasticsearch.client', name: 'elasticsearch-rest-client-sniffer', version: '6.5.4'

    implementation 'io.rsocket:rsocket-core:1.0.0-RC5'
    implementation 'io.rsocket:rsocket-transport-netty:1.0.0-RC5'
    implementation 'com.rabbitmq:amqp-client:5.7.3'
    implementation 'org.apache.kafka:kafka-clients:3.4.0'

    /* ASM 修改java字节码 */
    implementation group: 'org.ow2.asm', name: 'asm', version: '9.1'
    implementation group: 'cglib', name: 'cglib', version: '3.3.0'

    compile group: 'com.alibaba', name: 'fastjson', version: '1.2.62'
    compile group: 'io.etcd', name: 'jetcd-core', version: '0.3.0'
    compile group: 'io.jsonwebtoken', name: 'jjwt', version: '0.9.1'
    compile group: 'com.auth0', name: 'java-jwt', version: '3.4.0'

    implementation group: 'org.xerial.snappy', name: 'snappy-java', version: '1.1.8.4'
    implementation group: 'com.github.luben', name: 'zstd-jni', version: '1.5.2-3';
    implementation group: 'org.lz4', name: 'lz4-java', version: '1.8.0'

    implementation group: 'org.bouncycastle', name: 'bcprov-jdk15on', version: '1.70'

//    implementation 'net.java.dev.jna:jna:5.12.1'
    implementation 'org.javassist:javassist:3.27.0-GA'
    implementation 'com.github.oshi:oshi-core:3.6.2'
    implementation("de.sfuhrm:openssl4j:0.5.0")
    implementation("org.apache.commons:commons-pool2:2.11.1")
    implementation group: 'net.openhft', name: 'affinity', version: '3.2.2'
}

group = 'MS_Cloud'
version = '1.0-SNAPSHOT'
description = 'MS_Cloud Maven Webapp'
sourceCompatibility = '1.8'

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
    options.compilerArgs << '-XDignore.symbol.file'
    options.fork = true
    options.forkOptions.executable = 'javac'
}

mainClassName = 'com.macrosan.ServerStart'

shadowJar {
    baseName = 'MS_Cloud'
    classifier = null
    version = null
    mergeServiceFiles()
}